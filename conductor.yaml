# MasterProject/conductor.yaml
name: swift-hybrid-analyzer
description: "Експертний інструмент для аналізу Swift-коду. Виявляє Retain Cycles та Force Unwrapping."
tools:
  - name: analyze_code
    description: "Запускає гібридний аналіз Swift файлу та зберігає звіт у JSON"
    # ДОДАЄМО --package-path, щоб swift знайшов твій Analyzer всередині tool-repo
    command: "swift run --package-path ./tool-repo/Analyzer Analyzer {{file_path}} --api-key {{api_key}} --output report.json"
    inputs:
      - name: file_path
        description: "Шлях до файлу .swift"
        required: true
      - name: api_key
        description: "Ключ Groq/Llama"
        required: true
