name: 'Swift Hybrid Analyzer'
description: 'Гібридний аналіз Swift-коду (AST + LLM)'
inputs:
  file-path:
    description: 'Шлях до файлу для аналізу'
    required: true
  api-key:
    description: 'API ключ для LLM'
    required: true
  output-path:
    description: 'Шлях для збереження звіту'
    required: false
    default: 'report.json'
runs:
  using: 'composite'
  steps:
    - name: 'Run Analyzer'
      shell: bash
      run: |
        # Важливо: використовуємо github.action_path, щоб знайти папку Analyzer
        cd "${{ github.action_path }}/Analyzer"
        
        # Запускаємо аналізатор, вказуючи повний шлях до цільового файлу
        swift run Analyzer "${{ github.workspace }}/${{ inputs.file-path }}" \
          --api-key "${{ inputs.api-key }}" \
          --output "${{ github.workspace }}/${{ inputs.output-path }}"
