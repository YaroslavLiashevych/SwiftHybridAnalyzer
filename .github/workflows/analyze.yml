name: Code Review

on:
  pull_request:
    paths:
      - '**.swift'

jobs:
  analyze:
    runs-on: macos-latest

    steps:
      # 1. Завантажуємо код репозиторію
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Викликаємо твій локальний Action (який ми описали вище)
      - name: Run Hybrid Analysis
        uses: ./.
        with:
          file-path: 'TestFile.swift' # Файл, який аналізуємо
          api-key: ${{ secrets.GROQ_API_KEY }} # Ключ із Secrets
          output-path: 'report.json'

      # 3. Зберігаємо результат як артефакт
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: analyzer-report
          path: report.json
